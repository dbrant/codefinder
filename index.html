<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELS Code Finder</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --panel-width: 340px;
  --bg: #1a1a2e;
  --bg-panel: #16213e;
  --bg-input: #0f3460;
  --text: #e0e0e0;
  --text-dim: #8888aa;
  --accent: #e94560;
  --grid-text: #c8c8d8;
  --grid-highlight: #ffdd57;
  --border: #2a2a4a;
  --scrollbar-w: 10px;
}

html, body {
  height: 100%;
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

#app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ---- Grid Area ---- */
#grid-area {
  flex: 1;
  overflow: hidden;
  position: relative;
  padding: 12px;
}

#drop-zone {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  border: 3px dashed var(--border);
  border-radius: 12px;
  margin: 24px;
  transition: border-color 0.2s, background 0.2s;
  z-index: 10;
}

#drop-zone.drag-over {
  border-color: var(--accent);
  background: rgba(233, 69, 96, 0.08);
}

#drop-zone.hidden { display: none; }

#drop-zone .icon { font-size: 64px; opacity: 0.4; }
#drop-zone p { font-size: 1.1rem; color: var(--text-dim); }

#drop-zone label {
  padding: 10px 28px;
  background: var(--accent);
  color: #fff;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  transition: background 0.2s;
}
#drop-zone label:hover { background: #c73550; }
#drop-zone input[type="file"] { display: none; }

/* ---- Canvas + custom scrollbar ---- */
#grid-container {
  position: relative;
  display: none;
  height: 100%;
  overflow: hidden;
}

#grid-canvas {
  display: block;
  position: absolute;
  top: 0;
  left: 0;
}

/* Custom scrollbar */
#scrollbar-track {
  position: absolute;
  top: 0;
  right: 0;
  width: var(--scrollbar-w);
  height: 100%;
  background: rgba(255,255,255,0.03);
  cursor: pointer;
  z-index: 5;
}

#scrollbar-thumb {
  position: absolute;
  top: 0;
  left: 1px;
  width: calc(var(--scrollbar-w) - 2px);
  min-height: 24px;
  background: var(--border);
  border-radius: 4px;
  cursor: grab;
  transition: background 0.15s;
}
#scrollbar-thumb:hover,
#scrollbar-thumb.dragging {
  background: #4a4a6a;
}
#scrollbar-thumb.dragging { cursor: grabbing; }

/* ---- Control Panel ---- */
#panel {
  width: var(--panel-width);
  min-width: var(--panel-width);
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#panel h1 {
  font-size: 1.2rem;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

#panel h1 span.subtitle {
  font-size: 0.7rem;
  color: var(--text-dim);
  font-weight: normal;
}

.panel-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.panel-section h2 {
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.panel-section label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.panel-section input[type="text"],
.panel-section input[type="number"] {
  width: 100%;
  padding: 8px 10px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
}

.panel-section input:focus { border-color: var(--accent); }

.spacing-row { display: flex; gap: 10px; }
.spacing-row > div { flex: 1; }

#search-btn {
  width: 100%;
  margin-top: 12px;
  padding: 10px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
#search-btn:hover { background: #c73550; }
#search-btn:disabled { background: #555; cursor: not-allowed; }

#file-info {
  font-size: 0.8rem;
  color: var(--text-dim);
  padding: 8px 20px;
  border-bottom: 1px solid var(--border);
}

/* ---- Results ---- */
#results-area { flex: 1; overflow-y: auto; padding: 0; }

#results-area h2 {
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  padding: 16px 20px 8px;
}

#results-status {
  padding: 4px 20px 8px;
  font-size: 0.8rem;
  color: var(--text-dim);
}

#results-list { list-style: none; }

#results-list li {
  padding: 10px 20px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
  font-size: 0.9rem;
}

#results-list li:hover { background: rgba(233, 69, 96, 0.1); }

#results-list li.active {
  background: rgba(233, 69, 96, 0.2);
  border-left: 3px solid var(--accent);
}

#results-list li .result-word {
  font-family: 'Consolas', monospace;
  font-weight: bold;
  color: var(--grid-highlight);
  letter-spacing: 1px;
}

#results-list li .result-detail {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ---- Progress ---- */
#progress-bar-container { display: none; padding: 8px 20px; }
#progress-bar-container.visible { display: block; }

#progress-bar {
  width: 100%;
  height: 6px;
  background: var(--bg-input);
  border-radius: 3px;
  overflow: hidden;
}
#progress-bar-fill {
  height: 100%;
  width: 0%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.1s;
}
</style>
</head>
<body>

<div id="app">
  <div id="grid-area">
    <div id="drop-zone">
      <div class="icon">&#128196;</div>
      <p>Drag &amp; drop a text file here</p>
      <label>
        Or click to browse
        <input type="file" id="file-input" accept=".txt,.text,.utf8,.csv,.md">
      </label>
    </div>
    <div id="grid-container">
      <canvas id="grid-canvas"></canvas>
      <div id="scrollbar-track">
        <div id="scrollbar-thumb"></div>
      </div>
    </div>
  </div>

  <div id="panel">
    <h1>ELS Code Finder <span class="subtitle">Equidistant Letter Sequences</span></h1>

    <div id="file-info">No file loaded.</div>

    <div class="panel-section">
      <h2>Search</h2>
      <label for="search-term">Search term</label>
      <input type="text" id="search-term" placeholder="e.g. HELLO" autocomplete="off">

      <div class="spacing-row" style="margin-top: 12px;">
        <div>
          <label for="min-skip">Min spacing</label>
          <input type="number" id="min-skip" value="2" min="1">
        </div>
        <div>
          <label for="max-skip">Max spacing</label>
          <input type="number" id="max-skip" value="1000" min="1">
        </div>
      </div>

      <button id="search-btn" disabled>Search</button>
    </div>

    <div id="progress-bar-container">
      <div id="progress-bar"><div id="progress-bar-fill"></div></div>
    </div>

    <div id="results-area">
      <h2>Results</h2>
      <div id="results-status">Load a file and search to see results.</div>
      <ul id="results-list"></ul>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ---- DOM refs ----
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const gridArea = document.getElementById('grid-area');
  const gridContainer = document.getElementById('grid-container');
  const canvas = document.getElementById('grid-canvas');
  const ctx = canvas.getContext('2d');
  const scrollTrack = document.getElementById('scrollbar-track');
  const scrollThumb = document.getElementById('scrollbar-thumb');
  const fileInfo = document.getElementById('file-info');
  const searchTerm = document.getElementById('search-term');
  const minSkipEl = document.getElementById('min-skip');
  const maxSkipEl = document.getElementById('max-skip');
  const searchBtn = document.getElementById('search-btn');
  const resultsList = document.getElementById('results-list');
  const resultsStatus = document.getElementById('results-status');
  const progressContainer = document.getElementById('progress-bar-container');
  const progressFill = document.getElementById('progress-bar-fill');

  // ---- State ----
  let cleanedText = '';
  let originalChars = [];
  let gridCols = 0;
  let totalRows = 0;
  let rowHeight = 0;
  let cellWidth = 0;
  let baselineOffset = 0;
  let visibleRows = 0;       // how many rows fit in the viewport
  let scrollRow = 0;          // logical scroll position (fractional top row)
  let maxScrollRow = 0;       // max value for scrollRow
  let currentResults = [];
  let activeResultIndex = -1;
  let highlightedIndices = new Set();
  let searchAbort = null;
  let renderScheduled = false;
  let dpr = 1;

  // Scrollbar drag state
  let thumbDragging = false;
  let thumbDragStartY = 0;
  let thumbDragStartRow = 0;

  // ---- File loading ----

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => processText(e.target.result, file.name);
    reader.readAsText(file, 'UTF-8');
  }

  // ---- Text processing ----

  function isLetter(ch) { return /\p{Letter}/u.test(ch); }

  function stripToLetters(text) {
    const result = [];
    for (const char of text) {
      if (isLetter(char)) result.push(char);
    }
    return result;
  }

  function processText(raw, filename) {
    originalChars = stripToLetters(raw);
    cleanedText = originalChars.map(c => c.toUpperCase()).join('');

    fileInfo.textContent = `${filename} \u2014 ${originalChars.length.toLocaleString()} letters`;
    searchBtn.disabled = false;

    dropZone.classList.add('hidden');
    gridContainer.style.display = 'block';

    measureFont();
    setupGrid();
    clearResults();
  }

  // ---- Font measurement ----

  const FONT_SIZE = 14;
  const LINE_HEIGHT = 1.5;
  const FONT_FAMILY = "'Consolas', 'Courier New', 'Liberation Mono', monospace";

  function measureFont() {
    dpr = window.devicePixelRatio || 1;
    const tmpCanvas = document.createElement('canvas');
    const tmpCtx = tmpCanvas.getContext('2d');
    tmpCtx.font = `${FONT_SIZE}px ${FONT_FAMILY}`;
    const metrics = tmpCtx.measureText('M');
    cellWidth = Math.ceil(metrics.width + 2);
    rowHeight = Math.ceil(FONT_SIZE * LINE_HEIGHT);
    baselineOffset = Math.ceil(FONT_SIZE * 1.15);
  }

  // ---- Grid setup ----

  function computeGridCols() {
    // Reserve scrollbar width
    const areaWidth = gridArea.clientWidth - 24 - 12; // padding + scrollbar
    return Math.max(1, Math.floor(areaWidth / cellWidth));
  }

  function setupGrid() {
    gridCols = computeGridCols();
    totalRows = Math.ceil(originalChars.length / gridCols);

    const viewW = gridContainer.clientWidth - 12; // minus scrollbar
    const viewH = gridContainer.clientHeight;
    visibleRows = viewH / rowHeight;
    maxScrollRow = Math.max(0, totalRows - visibleRows);

    // Clamp current scroll
    scrollRow = Math.min(scrollRow, maxScrollRow);

    // Size canvas (CSS px)
    canvas.style.width = viewW + 'px';
    canvas.style.height = viewH + 'px';
    canvas.width = viewW * dpr;
    canvas.height = viewH * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    updateScrollbar();
    scheduleRender();
  }

  // ---- Logical scroll helpers ----

  function setScrollRow(row) {
    scrollRow = Math.max(0, Math.min(row, maxScrollRow));
    updateScrollbar();
    scheduleRender();
  }

  // ---- Custom scrollbar ----

  function updateScrollbar() {
    if (totalRows <= 0) return;
    const trackH = scrollTrack.clientHeight;

    // Thumb height proportional to visible fraction, min 24px
    const thumbH = Math.max(24, (visibleRows / totalRows) * trackH);
    scrollThumb.style.height = thumbH + 'px';

    // Thumb position
    const scrollable = trackH - thumbH;
    const ratio = maxScrollRow > 0 ? scrollRow / maxScrollRow : 0;
    scrollThumb.style.top = (ratio * scrollable) + 'px';

    // Hide scrollbar if everything fits
    scrollTrack.style.display = totalRows <= visibleRows ? 'none' : '';
  }

  // Thumb drag
  scrollThumb.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    e.stopPropagation();
    thumbDragging = true;
    thumbDragStartY = e.clientY;
    thumbDragStartRow = scrollRow;
    scrollThumb.classList.add('dragging');
    scrollThumb.setPointerCapture(e.pointerId);
  });

  scrollThumb.addEventListener('pointermove', (e) => {
    if (!thumbDragging) return;
    const trackH = scrollTrack.clientHeight;
    const thumbH = scrollThumb.clientHeight;
    const scrollable = trackH - thumbH;
    if (scrollable <= 0) return;

    const dy = e.clientY - thumbDragStartY;
    const rowDelta = (dy / scrollable) * maxScrollRow;
    setScrollRow(thumbDragStartRow + rowDelta);
  });

  scrollThumb.addEventListener('pointerup', () => {
    thumbDragging = false;
    scrollThumb.classList.remove('dragging');
  });

  // Click on track (jump to position)
  scrollTrack.addEventListener('pointerdown', (e) => {
    if (e.target === scrollThumb) return;
    const trackRect = scrollTrack.getBoundingClientRect();
    const clickY = e.clientY - trackRect.top;
    const trackH = trackRect.height;
    const ratio = clickY / trackH;
    setScrollRow(ratio * maxScrollRow);
  });

  // Mouse wheel on the grid area
  gridContainer.addEventListener('wheel', (e) => {
    e.preventDefault();
    // deltaY in pixels -> convert to rows (3 rows per "click")
    const rowDelta = (e.deltaY / 100) * 3;
    setScrollRow(scrollRow + rowDelta);
  }, { passive: false });

  // Keyboard scrolling when grid area is focused/hovered
  gridContainer.setAttribute('tabindex', '0');
  gridContainer.style.outline = 'none';
  gridContainer.addEventListener('keydown', (e) => {
    const pageRows = Math.floor(visibleRows);
    switch (e.key) {
      case 'ArrowUp':    setScrollRow(scrollRow - 1); e.preventDefault(); break;
      case 'ArrowDown':  setScrollRow(scrollRow + 1); e.preventDefault(); break;
      case 'PageUp':     setScrollRow(scrollRow - pageRows); e.preventDefault(); break;
      case 'PageDown':   setScrollRow(scrollRow + pageRows); e.preventDefault(); break;
      case 'Home':       setScrollRow(0); e.preventDefault(); break;
      case 'End':        setScrollRow(maxScrollRow); e.preventDefault(); break;
    }
  });

  // ---- Rendering ----

  function scheduleRender() {
    if (!renderScheduled) {
      renderScheduled = true;
      requestAnimationFrame(renderFrame);
    }
  }

  function renderFrame() {
    renderScheduled = false;

    const viewW = parseFloat(canvas.style.width);
    const viewH = parseFloat(canvas.style.height);
    const scrollPx = scrollRow * rowHeight; // fractional pixel offset

    ctx.clearRect(0, 0, viewW, viewH);

    // Visible row range
    let firstRow = Math.floor(scrollRow);
    let lastRow = Math.ceil(scrollRow + visibleRows);
    firstRow = Math.max(0, firstRow);
    lastRow = Math.min(totalRows - 1, lastRow);

    const hasHighlight = highlightedIndices.size > 0;

    // Draw text
    ctx.font = `${FONT_SIZE}px ${FONT_FAMILY}`;
    ctx.textBaseline = 'alphabetic';

    for (let row = firstRow; row <= lastRow; row++) {
      const y = row * rowHeight - scrollPx + baselineOffset;
      const rowStart = row * gridCols;
      const rowEnd = Math.min(rowStart + gridCols, originalChars.length);

      for (let i = rowStart; i < rowEnd; i++) {
        const col = i - rowStart;
        const x = col * cellWidth;
        const isHL = hasHighlight && highlightedIndices.has(i);

        if (isHL) {
          const bgY = row * rowHeight - scrollPx;
          ctx.fillStyle = 'rgba(233, 69, 96, 0.25)';
          ctx.fillRect(x, bgY, cellWidth, rowHeight);
          ctx.fillStyle = '#ffdd57';
          ctx.font = `bold ${FONT_SIZE}px ${FONT_FAMILY}`;
          ctx.fillText(originalChars[i], x, y);
          ctx.font = `${FONT_SIZE}px ${FONT_FAMILY}`;
        } else {
          ctx.fillStyle = '#c8c8d8';
          ctx.fillText(originalChars[i], x, y);
        }
      }
    }

    // Draw ELS connecting lines and dots
    if (activeResultIndex >= 0 && currentResults[activeResultIndex]) {
      const result = currentResults[activeResultIndex];
      const points = result.indices.map(idx => {
        const row = Math.floor(idx / gridCols);
        const col = idx % gridCols;
        return {
          x: col * cellWidth + cellWidth / 2,
          y: row * rowHeight + rowHeight / 2 - scrollPx
        };
      });

      if (points.length > 1) {
        ctx.strokeStyle = 'rgba(233, 69, 96, 0.7)';
        ctx.lineWidth = 2;
        ctx.setLineDash([4, 3]);
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.stroke();
        ctx.setLineDash([]);

        ctx.fillStyle = 'rgba(233, 69, 96, 0.9)';
        for (const p of points) {
          if (p.y >= -rowHeight && p.y <= viewH + rowHeight) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
    }
  }

  // Re-layout on resize
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (originalChars.length > 0) {
        measureFont();
        setupGrid();
        if (activeResultIndex >= 0 && currentResults[activeResultIndex]) {
          scrollToResult(currentResults[activeResultIndex]);
        }
      }
    }, 200);
  });

  // ---- ELS Search ----

  searchBtn.addEventListener('click', startSearch);
  searchTerm.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') startSearch();
  });

  function startSearch() {
    const term = searchTerm.value.trim();
    if (!term || !cleanedText) return;

    const needle = Array.from(term.toUpperCase()).filter(c => /\p{Letter}/u.test(c)).join('');
    if (needle.length < 2) {
      resultsStatus.textContent = 'Search term must have at least 2 letters.';
      return;
    }

    const lo = Math.max(1, parseInt(minSkipEl.value) || 1);
    const hi = Math.min(cleanedText.length, parseInt(maxSkipEl.value) || 1000);

    if (lo > hi) {
      resultsStatus.textContent = 'Min spacing must be \u2264 max spacing.';
      return;
    }

    if (searchAbort) searchAbort.abort = true;

    clearResults();
    searchBtn.disabled = true;
    progressContainer.classList.add('visible');
    progressFill.style.width = '0%';
    resultsStatus.textContent = 'Searching\u2026';

    const abort = { abort: false };
    searchAbort = abort;

    elsSearchAsync(cleanedText, needle, lo, hi, abort).then((results) => {
      if (abort.abort) return;
      searchBtn.disabled = false;
      progressContainer.classList.remove('visible');

      currentResults = results;
      resultsStatus.textContent = `Found ${results.length} result${results.length !== 1 ? 's' : ''}.`;

      results.forEach((r, idx) => {
        const li = document.createElement('li');

        const wordDiv = document.createElement('div');
        wordDiv.className = 'result-word';
        wordDiv.textContent = r.display;
        li.appendChild(wordDiv);

        const detailDiv = document.createElement('div');
        detailDiv.className = 'result-detail';
        const direction = r.skip > 0 ? 'forward' : 'reverse';
        detailDiv.textContent = `Spacing: ${Math.abs(r.skip)} | Position: ${r.indices[0]} | Dir: ${direction}`;
        li.appendChild(detailDiv);

        li.addEventListener('click', () => selectResult(idx));
        resultsList.appendChild(li);
      });
    });
  }

  function elsSearchAsync(text, needle, minS, maxS, abort) {
    return new Promise((resolve) => {
      const results = [];
      const needleLen = needle.length;
      const textLen = text.length;
      const needleChars = Array.from(needle);

      let currentSkip = minS;
      const totalSkips = (maxS - minS + 1) * 2;
      let processed = 0;

      function chunk() {
        if (abort.abort) { resolve([]); return; }

        const chunkSize = 50;
        let count = 0;

        while (currentSkip <= maxS && count < chunkSize) {
          searchWithSkip(text, textLen, needleChars, needleLen, currentSkip, results);
          searchWithSkip(text, textLen, needleChars, needleLen, -currentSkip, results);
          currentSkip++;
          count++;
          processed += 2;
        }

        progressFill.style.width = Math.min(100, (processed / totalSkips) * 100) + '%';

        if (currentSkip > maxS) {
          results.sort((a, b) => Math.abs(a.skip) - Math.abs(b.skip));
          resolve(results);
        } else {
          requestAnimationFrame(chunk);
        }
      }

      requestAnimationFrame(chunk);
    });
  }

  function searchWithSkip(text, textLen, needleChars, needleLen, skip, results) {
    const absSkip = Math.abs(skip);
    const span = (needleLen - 1) * absSkip;

    let startFrom, startTo;
    if (skip > 0) {
      startFrom = 0;
      startTo = textLen - span;
    } else {
      startFrom = span;
      startTo = textLen;
    }

    for (let i = startFrom; i < startTo; i++) {
      let found = true;
      for (let j = 0; j < needleLen; j++) {
        if (text[i + j * skip] !== needleChars[j]) {
          found = false;
          break;
        }
      }
      if (found) {
        const indices = [];
        for (let j = 0; j < needleLen; j++) {
          indices.push(i + j * skip);
        }
        results.push({
          skip: skip,
          indices: indices,
          display: needleChars.join('')
        });
      }
    }
  }

  // ---- Result selection & highlighting ----

  function clearResults() {
    currentResults = [];
    activeResultIndex = -1;
    resultsList.innerHTML = '';
    highlightedIndices.clear();
    scheduleRender();
  }

  function selectResult(idx) {
    if (idx === activeResultIndex) return;

    const lis = resultsList.querySelectorAll('li');
    lis.forEach(li => li.classList.remove('active'));
    if (lis[idx]) lis[idx].classList.add('active');

    activeResultIndex = idx;
    const result = currentResults[idx];

    highlightedIndices.clear();
    for (const i of result.indices) {
      highlightedIndices.add(i);
    }

    scrollToResult(result);
  }

  function scrollToResult(result) {
    const minIdx = Math.min(...result.indices);
    const maxIdx = Math.max(...result.indices);
    const firstResultRow = Math.floor(minIdx / gridCols);
    const lastResultRow = Math.floor(maxIdx / gridCols);

    const midRow = (firstResultRow + lastResultRow) / 2;
    setScrollRow(midRow - visibleRows / 2);
  }

})();
</script>
