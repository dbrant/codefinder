<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELS Code Finder</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --panel-width: 340px;
  --bg: #1a1a2e;
  --bg-panel: #16213e;
  --bg-input: #0f3460;
  --text: #e0e0e0;
  --text-dim: #8888aa;
  --accent: #e94560;
  --accent2: #0f3460;
  --highlight: #e94560;
  --grid-text: #c8c8d8;
  --grid-highlight: #ffdd57;
  --border: #2a2a4a;
}

html, body {
  height: 100%;
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}

#app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* ---- Grid Area ---- */
#grid-area {
  flex: 1;
  overflow: hidden;
  position: relative;
  padding: 12px;
}

#drop-zone {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  border: 3px dashed var(--border);
  border-radius: 12px;
  margin: 24px;
  transition: border-color 0.2s, background 0.2s;
  z-index: 10;
  pointer-events: auto;
}

#drop-zone.drag-over {
  border-color: var(--accent);
  background: rgba(233, 69, 96, 0.08);
}

#drop-zone.hidden { display: none; }

#drop-zone .icon {
  font-size: 64px;
  opacity: 0.4;
}

#drop-zone p {
  font-size: 1.1rem;
  color: var(--text-dim);
}

#drop-zone label {
  padding: 10px 28px;
  background: var(--accent);
  color: #fff;
  border-radius: 6px;
  cursor: pointer;
  font-weight: 600;
  transition: background 0.2s;
}
#drop-zone label:hover { background: #c73550; }
#drop-zone input[type="file"] { display: none; }

/* ---- Text Grid (virtual scroll) ---- */
#grid-container {
  position: relative;
  display: none;
  height: 100%;
  overflow-y: auto;
  overflow-x: hidden;
}

#grid-spacer {
  /* Tall invisible div that creates the correct scrollbar size */
  width: 1px;
  pointer-events: none;
}

#grid-viewport {
  position: sticky;
  top: 0;
  height: 100%;
  overflow: hidden;
  pointer-events: none;
}

#grid-canvas {
  position: absolute;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 2;
}

#text-grid {
  font-family: 'Consolas', 'Courier New', 'Liberation Mono', monospace;
  font-size: 14px;
  line-height: 1.5;
  letter-spacing: 2px;
  color: var(--grid-text);
  word-break: break-all;
  white-space: pre-wrap;
  position: absolute;
  top: 0;
  left: 0;
  z-index: 1;
  user-select: none;
  pointer-events: auto;
}

#text-grid .els-char {
  color: var(--grid-highlight);
  font-weight: bold;
  text-shadow: 0 0 6px rgba(255, 221, 87, 0.5);
  position: relative;
  z-index: 3;
}

/* ---- Control Panel ---- */
#panel {
  width: var(--panel-width);
  min-width: var(--panel-width);
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#panel h1 {
  font-size: 1.2rem;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

#panel h1 span.subtitle {
  font-size: 0.7rem;
  color: var(--text-dim);
  font-weight: normal;
}

.panel-section {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.panel-section h2 {
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 12px;
}

.panel-section label {
  display: block;
  font-size: 0.8rem;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.panel-section input[type="text"],
.panel-section input[type="number"] {
  width: 100%;
  padding: 8px 10px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
}

.panel-section input:focus {
  border-color: var(--accent);
}

.spacing-row {
  display: flex;
  gap: 10px;
}
.spacing-row > div { flex: 1; }

#search-btn {
  width: 100%;
  margin-top: 12px;
  padding: 10px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}
#search-btn:hover { background: #c73550; }
#search-btn:disabled {
  background: #555;
  cursor: not-allowed;
}

#file-info {
  font-size: 0.8rem;
  color: var(--text-dim);
  padding: 8px 20px;
  border-bottom: 1px solid var(--border);
}

/* ---- Results ---- */
#results-area {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

#results-area h2 {
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  padding: 16px 20px 8px;
}

#results-status {
  padding: 4px 20px 8px;
  font-size: 0.8rem;
  color: var(--text-dim);
}

#results-list {
  list-style: none;
}

#results-list li {
  padding: 10px 20px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
  font-size: 0.9rem;
}

#results-list li:hover {
  background: rgba(233, 69, 96, 0.1);
}

#results-list li.active {
  background: rgba(233, 69, 96, 0.2);
  border-left: 3px solid var(--accent);
}

#results-list li .result-word {
  font-family: 'Consolas', monospace;
  font-weight: bold;
  color: var(--grid-highlight);
  letter-spacing: 1px;
}

#results-list li .result-detail {
  font-size: 0.75rem;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ---- Progress ---- */
#progress-bar-container {
  display: none;
  padding: 8px 20px;
}
#progress-bar-container.visible { display: block; }

#progress-bar {
  width: 100%;
  height: 6px;
  background: var(--bg-input);
  border-radius: 3px;
  overflow: hidden;
}
#progress-bar-fill {
  height: 100%;
  width: 0%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.1s;
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #3a3a5a; }
</style>
</head>
<body>

<div id="app">
  <div id="grid-area">
    <div id="drop-zone">
      <div class="icon">&#128196;</div>
      <p>Drag &amp; drop a text file here</p>
      <label>
        Or click to browse
        <input type="file" id="file-input" accept=".txt,.text,.utf8,.csv,.md">
      </label>
    </div>
    <div id="grid-container">
      <div id="grid-viewport">
        <canvas id="grid-canvas"></canvas>
        <div id="text-grid"></div>
      </div>
      <div id="grid-spacer"></div>
    </div>
  </div>

  <div id="panel">
    <h1>ELS Code Finder <span class="subtitle">Equidistant Letter Sequences</span></h1>

    <div id="file-info">No file loaded.</div>

    <div class="panel-section">
      <h2>Search</h2>
      <label for="search-term">Search term</label>
      <input type="text" id="search-term" placeholder="e.g. HELLO" autocomplete="off">

      <div class="spacing-row" style="margin-top: 12px;">
        <div>
          <label for="min-skip">Min spacing</label>
          <input type="number" id="min-skip" value="2" min="1">
        </div>
        <div>
          <label for="max-skip">Max spacing</label>
          <input type="number" id="max-skip" value="1000" min="1">
        </div>
      </div>

      <button id="search-btn" disabled>Search</button>
    </div>

    <div id="progress-bar-container">
      <div id="progress-bar"><div id="progress-bar-fill"></div></div>
    </div>

    <div id="results-area">
      <h2>Results</h2>
      <div id="results-status">Load a file and search to see results.</div>
      <ul id="results-list"></ul>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ---- DOM refs ----
  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');
  const gridArea = document.getElementById('grid-area');
  const gridContainer = document.getElementById('grid-container');
  const gridViewport = document.getElementById('grid-viewport');
  const gridSpacer = document.getElementById('grid-spacer');
  const textGrid = document.getElementById('text-grid');
  const canvas = document.getElementById('grid-canvas');
  const ctx = canvas.getContext('2d');
  const fileInfo = document.getElementById('file-info');
  const searchTerm = document.getElementById('search-term');
  const minSkip = document.getElementById('min-skip');
  const maxSkip = document.getElementById('max-skip');
  const searchBtn = document.getElementById('search-btn');
  const resultsList = document.getElementById('results-list');
  const resultsStatus = document.getElementById('results-status');
  const progressContainer = document.getElementById('progress-bar-container');
  const progressFill = document.getElementById('progress-bar-fill');

  // ---- State ----
  let cleanedText = '';       // letters only, uppercased
  let originalChars = [];     // array of original (cleaned) characters for display
  let gridCols = 0;
  let totalRows = 0;
  let rowHeight = 0;          // measured px height of one row
  let charWidth = 0;          // measured px width of one character
  let currentResults = [];
  let activeResultIndex = -1;
  let highlightedIndices = new Set(); // char indices to highlight
  let searchAbort = null;

  // Virtual scroll state
  let renderedFirstRow = -1;
  let renderedLastRow = -1;
  let renderScheduled = false;
  // Map from char index -> span element (only for currently rendered chars)
  let charSpanMap = new Map();

  // ---- File loading ----

  dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
  });

  dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) loadFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) loadFile(fileInput.files[0]);
  });

  function loadFile(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const raw = e.target.result;
      processText(raw, file.name);
    };
    reader.readAsText(file, 'UTF-8');
  }

  // ---- Text processing ----

  function isLetter(ch) {
    return /\p{Letter}/u.test(ch);
  }

  function stripToLetters(text) {
    const result = [];
    for (const char of text) {
      if (isLetter(char)) {
        result.push(char);
      }
    }
    return result;
  }

  function processText(raw, filename) {
    originalChars = stripToLetters(raw);
    cleanedText = originalChars.map(c => c.toUpperCase()).join('');

    fileInfo.textContent = `${filename} \u2014 ${originalChars.length.toLocaleString()} letters`;
    searchBtn.disabled = false;

    // Hide drop zone, show grid
    dropZone.classList.add('hidden');
    gridContainer.style.display = 'block';

    measureFont();
    setupGrid();
    clearResults();
  }

  // ---- Font measurement ----

  function measureFont() {
    const tmp = document.createElement('span');
    tmp.style.fontFamily = "'Consolas', 'Courier New', 'Liberation Mono', monospace";
    tmp.style.fontSize = '14px';
    tmp.style.lineHeight = '1.5';
    tmp.style.letterSpacing = '2px';
    tmp.style.position = 'absolute';
    tmp.style.visibility = 'hidden';
    tmp.style.whiteSpace = 'pre';
    tmp.textContent = 'M\nM';
    document.body.appendChild(tmp);
    const rect = tmp.getBoundingClientRect();
    charWidth = rect.width;  // single char width (with letter-spacing)
    rowHeight = rect.height / 2;
    document.body.removeChild(tmp);
  }

  // ---- Virtual-scrolled grid ----

  function computeGridCols() {
    const areaWidth = gridArea.clientWidth - 24; // account for padding
    return Math.max(1, Math.floor(areaWidth / charWidth));
  }

  function setupGrid() {
    gridCols = computeGridCols();
    totalRows = Math.ceil(originalChars.length / gridCols);

    // Set spacer height to represent the full virtual document
    const totalHeight = totalRows * rowHeight;
    gridSpacer.style.height = totalHeight + 'px';

    // Size the viewport and canvas to the visible area
    const viewH = gridContainer.clientHeight;
    canvas.width = gridContainer.clientWidth;
    canvas.height = viewH;

    // Reset virtual scroll state
    renderedFirstRow = -1;
    renderedLastRow = -1;
    charSpanMap.clear();
    textGrid.innerHTML = '';

    // Scroll to top
    gridContainer.scrollTop = 0;

    // Initial render
    renderVisibleRows();
  }

  function renderVisibleRows() {
    renderScheduled = false;

    const scrollTop = gridContainer.scrollTop;
    const viewH = gridContainer.clientHeight;

    // Which rows are visible?
    const bufferRows = 5; // render a few extra rows above/below for smooth scrolling
    let firstRow = Math.floor(scrollTop / rowHeight) - bufferRows;
    let lastRow = Math.ceil((scrollTop + viewH) / rowHeight) + bufferRows;
    firstRow = Math.max(0, firstRow);
    lastRow = Math.min(totalRows - 1, lastRow);

    // Skip re-render if the visible range hasn't changed
    if (firstRow === renderedFirstRow && lastRow === renderedLastRow) {
      // Still need to update the text-grid offset and redraw canvas overlay
      updateGridPosition(scrollTop);
      drawHighlightOverlay(scrollTop);
      return;
    }

    renderedFirstRow = firstRow;
    renderedLastRow = lastRow;

    // Build only the visible rows
    const fragment = document.createDocumentFragment();
    charSpanMap.clear();

    const startIdx = firstRow * gridCols;
    const endIdx = Math.min((lastRow + 1) * gridCols, originalChars.length);

    for (let i = startIdx; i < endIdx; i++) {
      const span = document.createElement('span');
      span.textContent = originalChars[i];
      if (highlightedIndices.has(i)) {
        span.className = 'els-char';
      }
      charSpanMap.set(i, span);
      fragment.appendChild(span);

      // Line break at end of each row
      if ((i + 1) % gridCols === 0) {
        fragment.appendChild(document.createTextNode('\n'));
      }
    }

    textGrid.innerHTML = '';
    textGrid.appendChild(fragment);

    updateGridPosition(scrollTop);
    drawHighlightOverlay(scrollTop);
  }

  function updateGridPosition(scrollTop) {
    // Position the text-grid so that the rendered rows appear at the correct
    // offset within the sticky viewport.
    const offset = renderedFirstRow * rowHeight - scrollTop;
    textGrid.style.transform = `translateY(${offset}px)`;
  }

  // Schedule a render on scroll (throttled to rAF)
  gridContainer.addEventListener('scroll', () => {
    if (!renderScheduled) {
      renderScheduled = true;
      requestAnimationFrame(renderVisibleRows);
    }
  }, { passive: true });

  // Re-layout on resize
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (originalChars.length > 0) {
        measureFont();
        setupGrid();
        if (activeResultIndex >= 0 && currentResults[activeResultIndex]) {
          scrollToResult(currentResults[activeResultIndex]);
        }
      }
    }, 200);
  });

  // ---- ELS Search ----

  searchBtn.addEventListener('click', startSearch);
  searchTerm.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') startSearch();
  });

  function startSearch() {
    const term = searchTerm.value.trim();
    if (!term || !cleanedText) return;

    const needle = Array.from(term.toUpperCase()).filter(c => /\p{Letter}/u.test(c)).join('');
    if (needle.length < 2) {
      resultsStatus.textContent = 'Search term must have at least 2 letters.';
      return;
    }

    const lo = Math.max(1, parseInt(minSkip.value) || 1);
    const hi = Math.min(cleanedText.length, parseInt(maxSkip.value) || 1000);

    if (lo > hi) {
      resultsStatus.textContent = 'Min spacing must be \u2264 max spacing.';
      return;
    }

    // Cancel previous search
    if (searchAbort) searchAbort.abort = true;

    clearResults();
    searchBtn.disabled = true;
    progressContainer.classList.add('visible');
    progressFill.style.width = '0%';
    resultsStatus.textContent = 'Searching\u2026';

    const abort = { abort: false };
    searchAbort = abort;

    elsSearchAsync(cleanedText, needle, lo, hi, abort).then((results) => {
      if (abort.abort) return;
      searchBtn.disabled = false;
      progressContainer.classList.remove('visible');

      currentResults = results;
      resultsStatus.textContent = `Found ${results.length} result${results.length !== 1 ? 's' : ''}.`;

      results.forEach((r, idx) => {
        const li = document.createElement('li');

        const wordDiv = document.createElement('div');
        wordDiv.className = 'result-word';
        wordDiv.textContent = r.display;
        li.appendChild(wordDiv);

        const detailDiv = document.createElement('div');
        detailDiv.className = 'result-detail';
        const direction = r.skip > 0 ? 'forward' : 'reverse';
        detailDiv.textContent = `Spacing: ${Math.abs(r.skip)} | Position: ${r.indices[0]} | Dir: ${direction}`;
        li.appendChild(detailDiv);

        li.addEventListener('click', () => selectResult(idx));
        resultsList.appendChild(li);
      });
    });
  }

  // Async chunked search to avoid blocking UI
  function elsSearchAsync(text, needle, minS, maxS, abort) {
    return new Promise((resolve) => {
      const results = [];
      const needleLen = needle.length;
      const textLen = text.length;
      const needleChars = Array.from(needle);

      let currentSkip = minS;
      const totalSkips = (maxS - minS + 1) * 2;
      let processed = 0;

      function chunk() {
        if (abort.abort) { resolve([]); return; }

        const chunkSize = 50;
        let count = 0;

        while (currentSkip <= maxS && count < chunkSize) {
          searchWithSkip(text, textLen, needleChars, needleLen, currentSkip, results);
          searchWithSkip(text, textLen, needleChars, needleLen, -currentSkip, results);
          currentSkip++;
          count++;
          processed += 2;
        }

        progressFill.style.width = Math.min(100, (processed / totalSkips) * 100) + '%';

        if (currentSkip > maxS) {
          results.sort((a, b) => Math.abs(a.skip) - Math.abs(b.skip));
          resolve(results);
        } else {
          requestAnimationFrame(chunk);
        }
      }

      requestAnimationFrame(chunk);
    });
  }

  function searchWithSkip(text, textLen, needleChars, needleLen, skip, results) {
    const absSkip = Math.abs(skip);
    const span = (needleLen - 1) * absSkip;

    let startFrom, startTo;
    if (skip > 0) {
      startFrom = 0;
      startTo = textLen - span;
    } else {
      startFrom = span;
      startTo = textLen;
    }

    for (let i = startFrom; i < startTo; i++) {
      let found = true;
      for (let j = 0; j < needleLen; j++) {
        if (text[i + j * skip] !== needleChars[j]) {
          found = false;
          break;
        }
      }
      if (found) {
        const indices = [];
        for (let j = 0; j < needleLen; j++) {
          indices.push(i + j * skip);
        }
        results.push({
          skip: skip,
          indices: indices,
          display: needleChars.join('')
        });
      }
    }
  }

  // ---- Result selection & highlighting ----

  function clearResults() {
    currentResults = [];
    activeResultIndex = -1;
    resultsList.innerHTML = '';
    clearHighlight();
  }

  function clearHighlight() {
    highlightedIndices.clear();
    // Force re-render to remove highlight classes
    renderedFirstRow = -1;
    renderedLastRow = -1;
    renderVisibleRows();
  }

  function selectResult(idx) {
    if (idx === activeResultIndex) return;

    const lis = resultsList.querySelectorAll('li');
    lis.forEach(li => li.classList.remove('active'));
    if (lis[idx]) lis[idx].classList.add('active');

    activeResultIndex = idx;
    const result = currentResults[idx];

    // Update highlighted indices
    highlightedIndices.clear();
    for (const i of result.indices) {
      highlightedIndices.add(i);
    }

    scrollToResult(result);
  }

  function scrollToResult(result) {
    // Find the row range that contains this result
    const minIdx = Math.min(...result.indices);
    const maxIdx = Math.max(...result.indices);
    const firstResultRow = Math.floor(minIdx / gridCols);
    const lastResultRow = Math.floor(maxIdx / gridCols);

    // Try to center the result vertically
    const viewH = gridContainer.clientHeight;
    const visibleRows = Math.floor(viewH / rowHeight);
    const midRow = Math.floor((firstResultRow + lastResultRow) / 2);
    let targetScroll = (midRow - Math.floor(visibleRows / 2)) * rowHeight;
    targetScroll = Math.max(0, Math.min(targetScroll, gridContainer.scrollHeight - viewH));

    gridContainer.scrollTop = targetScroll;

    // Force re-render with new highlights
    renderedFirstRow = -1;
    renderedLastRow = -1;
    renderVisibleRows();
  }

  // ---- Canvas highlight overlay ----

  function drawHighlightOverlay(scrollTop) {
    const viewW = gridContainer.clientWidth;
    const viewH = gridContainer.clientHeight;
    canvas.width = viewW;
    canvas.height = viewH;
    ctx.clearRect(0, 0, viewW, viewH);

    if (highlightedIndices.size === 0) return;

    // Collect the pixel positions of highlighted chars in viewport coordinates
    const points = [];
    // Sort indices so lines connect in sequence
    const sortedIndices = Array.from(highlightedIndices).sort((a, b) => {
      // Maintain the order from the result (first to last in the sequence)
      return 0; // We'll use the result's indices order instead
    });

    // Use the active result's index order for line drawing
    let orderedIndices = [];
    if (activeResultIndex >= 0 && currentResults[activeResultIndex]) {
      orderedIndices = currentResults[activeResultIndex].indices;
    }

    for (const idx of orderedIndices) {
      const row = Math.floor(idx / gridCols);
      const col = idx % gridCols;

      // Convert to viewport pixel coordinates
      const x = col * charWidth + charWidth / 2;
      const y = row * rowHeight + rowHeight / 2 - scrollTop;

      points.push({ x, y, visible: y >= -rowHeight && y <= viewH + rowHeight });
    }

    if (points.length < 2) return;

    // Draw connecting lines
    ctx.strokeStyle = 'rgba(233, 69, 96, 0.7)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 3]);
    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
      ctx.lineTo(points[i].x, points[i].y);
    }
    ctx.stroke();

    // Draw dots at each visible letter position
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(233, 69, 96, 0.9)';
    for (const p of points) {
      if (p.visible) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

})();
</script>
</body>
</html>
