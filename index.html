<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELS Code Finder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <div id="grid-area">
    <div id="drop-zone">
      <div class="icon">&#128196;</div>
      <p>Drag &amp; drop a text file here</p>
      <label>
        Or click to browse
        <input type="file" id="file-input" accept=".txt,.text,.utf8,.csv,.md">
      </label>
    </div>
    <div id="grid-container">
      <canvas id="grid-canvas"></canvas>
      <div id="scrollbar-track">
        <div id="scrollbar-thumb"></div>
      </div>
    </div>
  </div>

  <div id="panel">
    <div id="panel-header">
      <h1>ELS Code Finder <span class="subtitle">Equidistant Letter Sequences</span></h1>
      <div id="theme-toggle">
        <button data-theme="light" title="Light mode">&#9788;</button>
        <button data-theme="auto" title="Auto (system)" class="active">A</button>
        <button data-theme="dark" title="Dark mode">&#9790;</button>
      </div>
    </div>
    <div id="file-info">
      <span id="file-info-text">No file loaded.</span>
      <button id="load-file-btn">Load file</button>
    </div>
    <div id="searches-area">
      <button id="add-search-btn" disabled>+ Add Search</button>
    </div>
    <div id="panel-footer">Vibe-coded with ❤️ by <a href="https://dmitrybrant.com" target="_blank">Dmitry Brant</a></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
